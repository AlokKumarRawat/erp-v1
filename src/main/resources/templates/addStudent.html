<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="/css/output.css" rel="stylesheet" />
</head>
<body class="grid grid-cols-4 scroll-smooth bg-gray-200">
<div th:replace="fragments/admin-nav::myNav"></div>
<div class="col-span-3 bg-gray-200 p-6">

    <!-- Add new student -->

    <section
            id="new-student"
            class="bg-gray-200 p-6 rounded shadow mb-8 m-4 w-full "
    >
        <h1
                class="text-3xl font-bold mb-10 bg-blue-500 p-2 pl-4 rounded-2xl text-white"
        >
            Add new student
        </h1>

        <form
                class="bg-white p-6 rounded shadow max-w-xl mx-auto flex flex-col gap-4" action="/addStudent" method="post"
        >
            <h2 class="text-3xl font-bold m-4 align-middle">Student Details</h2>
            <input
                    type="text"
                    placeholder="Username"
                    name="uname"
                    class="p-2 border rounded col-span-2"
            />
            <input
                    type="password"
                    placeholder="Password"
                    name="password"
                    class="p-2 border rounded col-span-2"
            />
            <input
                    type="text"
                    placeholder="Full Name"
                    name="fullname"
                    class="p-2 border rounded"
            />
            <input type="text" placeholder="Class" class="p-2 border rounded" />
            <input
                    type="email"
                    name="email"
                    placeholder="Email"
                    class="p-2 border rounded col-span-2"
            />
            <input
                    type="number"
                    name="mobile"
                    placeholder="Mobile number"
                    class="p-2 border rounded col-span-2"
            />
            <input
                    type="text"
                    name="address"
                    placeholder="Address"
                    class="p-2 border rounded col-span-2"
            />

            <button
                    class="col-span-2 bg-green-600 text-white py-2 rounded-2xl max-w-md w-sm m-auto"
            >
                Add Student
            </button>
        </form>
        <div class="alert alert-success" th:if="${message}" th:text="${message}">

        </div>

    </section>
</div>
</body>
</html>
