<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="/css/output.css" rel="stylesheet" />
</head>
<body class="grid grid-cols-4 scroll-smooth bg-gray-200">
<div th:replace="fragments/admin-nav::myNav"></div>
<div class="col-span-3 bg-gray-200 p-6">


    <!-- Add new Teacher -->

    <section
            id="new-teacher"
            class="bg-gray-200 p-6 rounded shadow mb-8 m-4 w-full "
    >
        <h1
                class="text-3xl font-bold mb-10 bg-blue-500 p-2 pl-4 rounded-2xl text-white"
        >
            Add new teacher
        </h1>

        <form
                class="bg-white p-6 rounded shadow max-w-xl mx-auto flex flex-col gap-4" action="/addTeacher" method="post"
        >
            <h2 class="text-3xl font-bold m-4 text-center mb-4">
                Teacher Details
            </h2>
            <input
                    type="text"
                    name="userid"
                    placeholder="Username"
                    class="p-2 border rounded col-span-2"
            />
            <input
                    type="password"
                    placeholder="Password"
                    name="password"
                    class="p-2 border rounded col-span-2"
            />
            <input
                    type="text"
                    name="fullName"
                    placeholder="Full Name"
                    class="p-2 border rounded"
            />
            <input
                    type="email"
                    name="email"
                    placeholder="Email"
                    class="p-2 border rounded col-span-2"
            />
            <select name="Subject" id="2nd" class="p-2 border rounded col-span-2">
                <option value="">Subject</option>
                <option value="Math">Math</option>
                <option value="Physics">Physics</option>
                <option value="Chemistry">Chemistry</option>
                <option value="English">English</option>
                <option value="Hindi">Hindi</option>
                <option value="Computer">Computer</option>
                <option value="Physical Education">Physical Education</option>
                <option value="Biology">Biology</option>
            </select>
            <input
                    type="number"
                    name="mobile"
                    placeholder="Mobile number"
                    class="p-2 border rounded col-span-2"
            />
            <input
                    type="text"
                    placeholder="Address"
                    name="address"
                    class="p-2 border rounded col-span-2"
            />

            <button
                    class="col-span-2 bg-green-600 text-white py-2 rounded-2xl max-w-md w-sm m-auto"
            >
                Add Teacher
            </button>
        </form>
        <div class="alert alert-success" th:if="${message}" th:text="${message}">

        </div>
    </section>


</div>

</body>
</html>
